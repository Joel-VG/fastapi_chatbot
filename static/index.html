<!DOCTYPE html>
<html>
<head>
    <title>Groq AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            transition: 0.3s;
        }

        .sidebar {
            width: 280px;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 20px;
            overflow-y: auto;
            transition: 0.3s;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .new-chat {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .history-item {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            word-wrap: break-word;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.18);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 28px;
            font-weight: bold;
            transition: 0.3s;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .message {
            max-width: 75%;
            margin-bottom: 20px;
            padding: 18px;
            border-radius: 18px;
            line-height: 1.6;
        }

        .user {
            margin-left: auto;
            color: white;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
        }

        .bot {
            color: white;
            background: rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .input-wrapper {
            padding: 25px;
        }

        .input-box {
            display: flex;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 12px;
            transition: 0.3s;
        }

        #prompt {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 12px;
            transition: 0.3s;
        }

        .send-btn {
            border: none;
            padding: 14px 22px;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            cursor: pointer;
        }

        .welcome {
            text-align: center;
            color: #cbd5e1;
            margin-top: 120px;
            font-size: 24px;
            transition: 0.3s;
        }

        /* LIGHT MODE */
        body.light {
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
        }

        body.light .sidebar {
            background: rgba(255,255,255,0.95);
            color: black;
        }

        body.light .header {
            color: black;
        }

        body.light .welcome {
            color: #334155;
        }

        body.light .history-item {
            background: rgba(0,0,0,0.08);
            color: black;
        }

        body.light .history-item:hover {
            background: rgba(0,0,0,0.15);
        }

        body.light .input-box {
            background: rgba(0,0,0,0.08);
        }

        body.light #prompt {
            color: black;
        }

        body.light .bot {
            background: rgba(0,0,0,0.08);
            color: black;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">🤖 Groq AI</div>
    <button id="themeToggle" class="new-chat">☀️ Light Mode</button>
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <div id="chat-history"></div>
</div>

<div class="chat-area">
    <div class="header">AI Assistant</div>

    <div id="chat-box">
        <div class="welcome">Ask me anything ✨</div>
    </div>

    <div class="input-wrapper">
        <div class="input-box">
            <input id="prompt" placeholder="Message AI..." />
            <button class="send-btn" onclick="generate()">Send</button>
        </div>
    </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("groqChats")) || [];
let currentChat = [];

function saveChats() {
    localStorage.setItem("groqChats", JSON.stringify(chats));
}

function renderHistory() {
    const history = document.getElementById("chat-history");
    history.innerHTML = "";

    chats.forEach((chat, index) => {
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerText = chat.title;
        item.onclick = () => loadChat(index);
        history.appendChild(item);
    });
}

function loadChat(index) {
    currentChat = chats[index].messages;
    const chatBox = document.getElementById("chat-box");
    chatBox.innerHTML = "";

    currentChat.forEach(msg => {
        chatBox.innerHTML += `<div class="message ${msg.role}">${msg.text}</div>`;
    });
}

function newChat() {
    currentChat = [];
    document.getElementById("chat-box").innerHTML =
        '<div class="welcome">Ask me anything ✨</div>';
}

async function generate() {
    const input = document.getElementById("prompt");
    const prompt = input.value;
    const chatBox = document.getElementById("chat-box");

    if (!prompt.trim()) return;

    if (chatBox.innerHTML.includes("Ask me anything")) {
        chatBox.innerHTML = "";
    }

    chatBox.innerHTML += `<div class="message user">${prompt}</div>`;
    currentChat.push({ role: "user", text: prompt });
    input.value = "";

    chatBox.innerHTML += `<div class="message bot" id="loading">Thinking...</div>`;

    const response = await fetch("http://127.0.0.1:8000/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt: prompt })
    });

    const data = await response.json();

    document.getElementById("loading").remove();
    chatBox.innerHTML += `<div class="message bot">${data.response}</div>`;
    currentChat.push({ role: "bot", text: data.response });

    if (currentChat.length === 2) {
        chats.push({
            title: prompt.substring(0, 25) + "...",
            messages: [...currentChat]
        });
    } else {
        chats[chats.length - 1].messages = [...currentChat];
    }

    saveChats();
    renderHistory();
    chatBox.scrollTop = chatBox.scrollHeight;
}

const themeBtn = document.getElementById("themeToggle");

themeBtn.addEventListener("click", function () {
    document.body.classList.toggle("light");

    if (document.body.classList.contains("light")) {
        themeBtn.innerText = "🌙 Dark Mode";
    } else {
        themeBtn.innerText = "☀️ Light Mode";
    }
});

renderHistory();

document.getElementById("prompt").addEventListener("keypress", function(e) {
    if (e.key === "Enter") generate();
});
</script>

</body>
</html>
